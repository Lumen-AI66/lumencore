# Lumencore — local laptop override for docker-compose.phase2.yml
#
# Usage (from repo root):
#   docker compose \
#     -f lumencore/docker-compose.phase2.yml \
#     -f lumencore/docker-compose.local.yml \
#     --env-file .env.local \
#     up -d
#
# This file overrides all VPS-specific absolute paths (/opt/lumencore/...)
# with relative paths so the stack builds and runs on a local laptop.
# Networks are created automatically (external: false).
# Do NOT commit .env.local — it is gitignored via .env.* rule.

services:

  lumencore-api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    env_file:
      - ../.env.local
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      API_PORT: "8000"
      POSTGRES_HOST: lumencore-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-lumencore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lumencore}
      REDIS_HOST: lumencore-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_DB: ${CELERY_BROKER_DB:-0}
      CELERY_RESULT_DB: ${CELERY_RESULT_DB:-1}
      LUMENCORE_SYSTEM_PHASE: ${LUMENCORE_SYSTEM_PHASE:-66}
      LUMENCORE_RELEASE_ID: ${LUMENCORE_RELEASE_ID:-local-dev}
      LUMENCORE_RELEASE_MANIFEST_SHA256: ${LUMENCORE_RELEASE_MANIFEST_SHA256:-unset}
      LUMENCORE_OPENAI_API_KEY: ${LUMENCORE_OPENAI_API_KEY}
      LUMENCORE_DEPLOYMENT_PATH: /tmp/lumencore/deployment
    volumes: []

  lumencore-worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    env_file:
      - ../.env.local
    environment:
      APP_ENV: development
      POSTGRES_HOST: lumencore-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-lumencore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lumencore}
      REDIS_HOST: lumencore-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_DB: ${CELERY_BROKER_DB:-0}
      CELERY_RESULT_DB: ${CELERY_RESULT_DB:-1}
      CELERY_POOL: ${CELERY_POOL:-solo}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-2}
      LUMENCORE_SYSTEM_PHASE: ${LUMENCORE_SYSTEM_PHASE:-66}
      LUMENCORE_RELEASE_ID: ${LUMENCORE_RELEASE_ID:-local-dev}
      LUMENCORE_RELEASE_MANIFEST_SHA256: ${LUMENCORE_RELEASE_MANIFEST_SHA256:-unset}
      LUMENCORE_OPENAI_API_KEY: ${LUMENCORE_OPENAI_API_KEY}

  lumencore-scheduler:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    env_file:
      - ../.env.local
    environment:
      APP_ENV: development
      POSTGRES_HOST: lumencore-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-lumencore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lumencore}
      REDIS_HOST: lumencore-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_DB: ${CELERY_BROKER_DB:-0}
      CELERY_RESULT_DB: ${CELERY_RESULT_DB:-1}
      LUMENCORE_SYSTEM_PHASE: ${LUMENCORE_SYSTEM_PHASE:-66}
      LUMENCORE_RELEASE_ID: ${LUMENCORE_RELEASE_ID:-local-dev}
      LUMENCORE_RELEASE_MANIFEST_SHA256: ${LUMENCORE_RELEASE_MANIFEST_SHA256:-unset}
      LUMENCORE_OPENAI_API_KEY: ${LUMENCORE_OPENAI_API_KEY}

  lumencore-dashboard:
    build:
      context: ./deploy/dashboard
      dockerfile: Dockerfile
    env_file:
      - ../.env.local
    ports:
      - "8080:8080"

  lumencore-proxy:
    volumes:
      - ../vps/nginx/lumencore.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  lumencore-internal:
    external: false
    name: lumencore-local-internal
  lumencore-public:
    external: false
    name: lumencore-local-public
